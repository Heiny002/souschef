name: iOS Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Create Secrets.xcconfig
        # Gitignored and referenced by the project's base configuration.
        # CI needs the file present; the key stays empty (LLM layers inert).
        run: cp Secrets.example.xcconfig Secrets.xcconfig

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project SousChef.xcodeproj \
            -scheme SousChef

      - name: Pick an available iOS simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | python3 -c "import sys, json; devs = json.load(sys.stdin)['devices']; ids = [d['udid'] for rt in devs for d in devs[rt] if d.get('isAvailable') and d['name'].startswith('iPhone')]; print(ids[0] if ids else '')")
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found" >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project SousChef.xcodeproj \
            -scheme SousChef \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult \
          | tee xcodebuild.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore
