name: SousChef
options:
  bundleIdPrefix: com.souschef
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: "2.7.0"

targets:
  SousChef:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    sources:
      - path: Sources/SousChef
    resources:
      # Fonts are copied flat to the bundle root; Info.plist's UIAppFonts
      # references them by bare filename.
      - path: Sources/SousChef/Resources/Fonts
        optional: true
      # Data must be a folder reference (blue) so the JSON files land under a
      # "Data/" subdirectory in the bundle. The loaders resolve them with
      # `subdirectory: "Data"`; a plain group would flatten them to the root
      # and every lookup would return nil, silently disabling the diet/allergy
      # safety feature (see docs/AUDIT-second-pass.md).
      - path: Sources/SousChef/Resources/Data
        type: folder
        optional: true
    dependencies:
      - package: SwiftSoup
      - sdk: CloudKit.framework
      - sdk: Speech.framework
      - sdk: AVFoundation.framework
      - sdk: NaturalLanguage.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.souschef.app
        PRODUCT_NAME: SousChef
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: Sources/SousChef/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
        ENABLE_PREVIEWS: "YES"
        DEBUG_INFORMATION_FORMAT: dwarf
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      configs:
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    postBuildScripts:
      # Bakes the current git commit date + hash into the bundle (CommitInfo.json) so the
      # Library's version stamp shows when the CODE was last updated. Runs on every build
      # (no dependency analysis) — a stale stamp means a stale checkout.
      - name: Stamp commit info
        basedOnDependencyAnalysis: false
        script: |
          INFO_PATH="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/CommitInfo.json"
          COMMIT_DATE=$(git -C "${SRCROOT}" log -1 --format=%cI 2>/dev/null || echo "")
          COMMIT_HASH=$(git -C "${SRCROOT}" rev-parse --short HEAD 2>/dev/null || echo "")
          printf '{"commitDate":"%s","commitHash":"%s"}' "${COMMIT_DATE}" "${COMMIT_HASH}" > "${INFO_PATH}"
    entitlements:
      path: Sources/SousChef/SousChef.entitlements
    scheme:
      testTargets:
        - SousChefTests

  SousChefTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/SousChefTests
    dependencies:
      - target: SousChef
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.souschef.tests
        GENERATE_INFOPLIST_FILE: "YES"
